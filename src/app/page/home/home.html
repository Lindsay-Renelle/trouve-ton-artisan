<!-- ===== SECTION HERO ===== -->
<section class="hero container mt-5">

  <div class="hero-content mx-auto">

    <h1 class="hero-title">Trouve ton artisan !</h1>
    <p class="hero-subtitle">Artisans locaux, qualité garantie</p>

    <div class="d-flex gap-2 mt-4 justify-content-center">
      
      <input 
        type="text"
        class="form-control w-50"
        placeholder="Rechercher un artisan..."
        [(ngModel)]="termeRecherche"
      >

      <button 
        class="btn btn-primary"
        (click)="rechercher()"
      >
        Rechercher
      </button>

    </div>

  </div>

</section>


<!-- ===== SECTION ÉTAPES ===== -->
<section class="etapes container mt-5">

  <h2 class="text-center mb-4">Comment trouver mon artisan ?</h2>

  <div class="row">

    <div class="col-md-6 mb-3" *ngFor="let etape of etapes">
      <div class="etape p-3 border rounded d-flex align-items-center gap-3">
        <span class="badge bg-primary">{{ etape.id }}</span>
        <p class="mb-0">{{ etape.texte }}</p>
      </div>
    </div>

  </div>

</section>
