<!-- ===== SECTION HERO (haut de page) ===== -->
<section class="hero container text-center mt-5">

    <h1>Trouver un artisan près de chez vous</h1>
  
    <!-- Sous-titre -->

    <!-- Zone de recherche -->
    <div class="mt-4">

      <input

        class="form-control d-inline w-50" 
        placeholder="Rechercher un artisan..."

      <!-- Bouton de recherche -->
      <button class="btn btn-primary mt-2">
        Rechercher
      </button>
  
    </div>
  </section>
